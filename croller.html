<style>
  .xat-wrapper {
    width: 100%;
    overflow: hidden;
    background: transparent;
    padding: 40px 0;
    position: relative;
  }

  .xat-slider {
    display: flex;
    width: max-content;
    animation: scorriXat 60s linear infinite;
    gap: 25px;
  }

  .xat-wrapper:hover .xat-slider {
    animation-play-state: paused;
  }

  .dj-card {
    position: relative;
    width: 220px;
    height: 220px;
    border-radius: 12px;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    -webkit-box-reflect: below 2px linear-gradient(transparent, rgba(255,255,255,0.1));
  }

  .dj-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 12px;
  }

  .dj-name {
    position: absolute;
    bottom: 5px;
    left: 0;
    width: 100%;
    color: #FDD017;
    font-family: 'Montserrat', sans-serif;
    font-weight: bold;
    font-size: 15px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-shadow: 2px 2px 3px rgba(0,0,0,1), -1px -1px 0 rgba(0,0,0,1), 1px -1px 0 rgba(0,0,0,1);
    pointer-events: none;
  }

  .dj-card:hover {
    transform: scale(1.1) translateY(-10px);
    z-index: 99;
  }

  @keyframes scorriXat {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .xat-header { text-align: center; margin-bottom: 20px; }
  .xat-header img { vertical-align: middle; margin: 0 15px; }
</style>
